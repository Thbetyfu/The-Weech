<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheWeech | Ramal Masa Depan Konten Kamu</title>
    <!-- CSS Terjahit -->
    <link rel="stylesheet" href="/static/css/landing.css">
</head>
<body>

    <div class="hero-wrapper">
        <!-- Navbar Subframe -->
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo-vector"></div>
                <span class="logo-text">TheWeech</span>
            </div>
            
            <div class="nav-menus">
                <a href="#" class="nav-link">Beranda</a>
                <a href="#" class="nav-link">Harga</a>
                <a href="#" class="nav-link">Tentang</a>
            </div>

            <div class="nav-actions">
                <div class="lang-switch">
                    <span>Bahasa</span>
                    <svg width="12" height="16" viewBox="0 0 12 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 6L6 10.5L10.5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="auth-btns">
                    <a href="#" class="btn-login">Login</a>
                    <a href="/dashboard" class="btn-register">
                        <span>Register</span>
                        <div class="reg-icon-circle"></div>
                    </a>
                </div>
            </div>
        </nav>

        <!-- Latar Belakang Mistis -->
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>

        <!-- Konten Utama -->
        <main class="main-content">
            
            <!-- Subheader: Behavioral Projection -->
            <div class="subheader">
                <div class="subheader-icon"></div>
                <span class="subheader-text">TheWeech Behavioral Projection</span>
            </div>

            <!-- Headline: Aku Biasa Meramal... -->
            <div class="headline-container">
                <h1 class="headline-text">
                    Aku Bisa <em>Meramal</em><br>
                    Masa Depan <strong>Konten Kamu</strong>
                </h1>
                <p class="subheadline-text">
                    Masukkan video anda untuk memulai ramalan
                </p>
            </div>

            <!-- Action: Input Instagram & Button -->
            <div class="action-bar">
                <input type="text" class="input-field" placeholder="Link video Instagram" id="link-input">
                <button class="btn-generate" onclick="startDivination()">
                    <span class="btn-text">Mulai ramal</span>
                    <div class="btn-icon"></div>
                </button>
            </div>

            <!-- Frame Dekoratif (Optional: Visual Buku ada di BG) -->
        </main>
    </div>

    <!-- Script Sederhana untuk Forward ke Dashboard -->
    <script>
        function startDivination() {
            const link = document.getElementById('link-input').value;
            if (link) {
                // Simulasi loading sebelum masuk ke dashboard analisis
                window.location.href = "/dashboard?url=" + encodeURIComponent(link);
            } else {
                alert("Masukkan link video Instagram kamu terlebih dahulu!");
            }
        }
    </script>
</body>
</html>
